<!-- ============================= -->
<!-- PRODUCT LISTING PAGE -->
<!-- ============================= -->

<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Page Title -->
  <title>Shop Backpacks</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>
  <header class="header">

  <!-- Top Bar -->
  <div class="top-bar">
    <div> Select Language | USD </div>

    <div class="social-icons">
      <i class="fa fa-facebook"></i>
      <i class="fa fa-twitter"></i>
      <i class="fa fa-linkedin"></i>
    </div>
  </div>

  <!-- Main Navbar -->
<div class="navbar">

  <!-- Logo -->
  <div class="logo">Payne.</div>

  <!-- Hamburger (only visible on mobile) -->
  <div class="hamburger" id="hamburger">
    ☰
  </div>

  <!-- Menu -->
  <ul class="nav-menu" id="navMenu">

    <li><a href="#">Home</a></li>
    <li><a href="pages/product.html">Shop</a></li>

    <li class="dropdown">
      <a href="#">Pages</a>
      <ul class="dropdown-menu">
        <li><a href="#">About</a></li>
        <li><a href="#">FAQ</a></li>
        <li><a href="#">Checkout</a></li>
      </ul>
    </li>

    <li><a href="#">Blog</a></li>
    <li><a href="#">Contact Us</a></li>

  </ul>

  <!-- Icons -->
  <div class="nav-icons">
    <i class="fa fa-search"></i>
    <i class="fa fa-user"></i>
    <i class="fa fa-heart"></i>

    <div class="cart-icon">
      <i class="fa fa-shopping-bag"></i>
      <span id="cartCount">0</span>
    </div>
  </div>

</div>

</header>

<!-- ============================= -->
<!-- PAGE HEADER -->
<!-- ============================= -->

<h1 class="page-title">Shop Backpacks</h1>


<!-- ============================= -->
<!-- MAIN LAYOUT -->
<!-- Sidebar + Products -->
<!-- ============================= -->

<div class="shop-container">

  <!-- ============================= -->
  <!-- SIDEBAR FILTERS -->
  <!-- ============================= -->

  <aside class="filters">

    <h3>Categories</h3>

    <!-- Category filters -->
    <label>
      <input type="checkbox" value="Travel" class="category-filter">
      Travel
    </label>

    <label>
      <input type="checkbox" value="Office" class="category-filter">
      Office
    </label>

    <label>
      <input type="checkbox" value="School" class="category-filter">
      School
    </label>

    <label>
      <input type="checkbox" value="Hiking" class="category-filter">
      Hiking
    </label>


    <!-- ============================= -->
    <!-- PRICE FILTER -->
    <!-- ============================= -->

    <h3>Price Range</h3>

    <!-- minimum price -->
    <input type="number" id="minPrice" placeholder="Min Price">

    <!-- maximum price -->
    <input type="number" id="maxPrice" placeholder="Max Price">


    <!-- ============================= -->
    <!-- SORTING -->
    <!-- ============================= -->

    <h3>Sort By</h3>

    <select id="sortProducts">

      <option value="">Default</option>

      <option value="low-high">Price Low to High</option>

      <option value="high-low">Price High to Low</option>

      <option value="name">Name A-Z</option>

      <option value="rating">Top Rating</option>

    </select>

  </aside>



  <!-- ============================= -->
  <!-- PRODUCT GRID -->
  <!-- ============================= -->

  <section class="products-area">

    <!-- Search within products -->
    <input type="text" id="productSearch" placeholder="Search products...">

    <!-- Grid container -->
    <div class="products-grid" id="productsContainer"></div>

    <!-- Load More button -->
    <button id="loadMoreBtn">Load More</button>

  </section>

  <!-- =====================================
CART DRAWER (SLIDE FROM LEFT)
===================================== -->

<!-- Overlay (dark background when cart opens) -->
<div class="cart-overlay" id="cartOverlay"></div>

<!-- Cart Drawer -->
<div class="cart-drawer" id="cartDrawer">

  <!-- Cart Header -->
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button id="closeCart">✖</button>
  </div>

  <!-- Cart Items Container -->
  <div class="cart-items" id="cartItems">
    <!-- Items will load dynamically here -->
  </div>

  <!-- Cart Footer -->
  <div class="cart-footer">
    <p>Subtotal: $<span id="cartSubtotal">0</span></p>
    <button class="checkout-btn">Checkout</button>
  </div>

</div>
<!-- Toast Message -->
<div id="toast" class="toast"></div>


</div>



<!-- Load JS files -->
<script src="../js/data.js"></script>
<script src="../js/products.js"></script>


</body>

</html>
