<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- ========================= -->
<!-- PRODUCT DETAIL WRAPPER -->
<!-- ========================= -->

<div class="product-detail-container">

  <!-- LEFT SIDE -->
  <div class="product-left">

    <!-- Thumbnails -->
    <div class="thumbs" id="thumbnails"></div>

    <!-- Main Image -->
    <div class="main-image">
      <img id="mainImage" src="">
    </div>

  </div>


  <!-- RIGHT SIDE -->
  <div class="product-right">

    <h2 id="productTitle"></h2>

    <p class="rating" id="productRating"></p>

    <p class="price">
      <span id="productPrice"></span>
    </p>

    <p class="desc" id="productDesc"></p>


    <!-- Quantity -->
    <div class="qty-box">
      <button id="decrease">-</button>
      <span id="qty">1</span>
      <button id="increase">+</button>
    </div>


    <!-- Colors -->
    <div class="colors" id="variantContainer"></div>


    <!-- Buttons -->
    <div class="buttons">

      <button id="addToCart">Add to Cart</button>

      <button id="buyNow">Buy Now</button>

    </div>

  </div>

</div>


<!-- ========================= -->
<!-- RELATED PRODUCTS -->
<!-- ========================= -->

<h3 class="section-title">Custom Collection</h3>

<div class="products-grid" id="relatedProducts"></div>

<script src="../js/data.js"></script>
<script src="../js/product_detail.js"></script>
</body>
</html>
